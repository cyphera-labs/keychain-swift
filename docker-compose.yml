services:
  vault:
    image: hashicorp/vault:latest
    command: server -dev -dev-root-token-id=test-token
    ports: ["8200:8200"]
    environment:
      VAULT_DEV_ROOT_TOKEN_ID: test-token

  localstack:
    image: localstack/localstack:latest
    ports: ["4566:4566"]
    environment:
      SERVICES: kms
